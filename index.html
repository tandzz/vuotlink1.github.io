<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Đang chuyển hướng an toàn...</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; background: #f4f4f4; }
        .box { background: white; padding: 30px; display: inline-block; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .btn { display: none; background: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>Hệ thống đang kiểm tra tệp tin...</h2>
    <p id="status">Vui lòng chờ <span id="countdown">15</span> giây...</p>
    <a href="https://funlink-cua-ban.com/abcde" id="download-btn" class="btn" rel="noreferrer">BẤM VÀO ĐÂY ĐỂ TIẾP TỤC</a>
</div>

<script>
    let seconds = 15; // Số giây bắt đợi để hợp thức hóa traffic thật
    let countdown = document.getElementById('countdown');
    let statusText = document.getElementById('status');
    let btn = document.getElementById('download-btn');

    let timer = setInterval(function() {
        seconds--;
        countdown.textContent = seconds;
        if (seconds <= 0) {
            clearInterval(timer);
            statusText.style.display = 'none';
            btn.style.display = 'inline-block'; // Hiện nút cho khách tự bấm
        }
    }, 1000);
</script>

</body>
</html>
