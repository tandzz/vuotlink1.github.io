<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Xác Thực Tài Khoản</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 480px;
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
            font-size: 22px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
        }
        .field-box {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            background-color: #f8fafc;
            color: #334155;
            outline: none;
            transition: border 0.2s;
        }
        input:focus {
            border-color: #3b82f6;
        }
        button {
            padding: 12px 16px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .btn-success {
            background-color: #10b981;
        }
        .btn-success:hover {
            background-color: #059669;
        }
        #error-msg {
            color: #dc2626;
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }
        #result-section {
            display: none;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px dashed #e2e8f0;
        }
        /* Style cho đồng hồ đếm ngược */
        .timer-banner {
            background-color: #fffbeb;
            border: 1px solid #fef3c7;
            color: #b45309;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }
        /* Màn hình khóa 3 tiếng */
        #block-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            padding: 20px;
        }
        #block-screen h1 {
            color: #dc2626;
            margin-bottom: 15px;
            font-size: 24px;
        }
        #block-screen p {
            color: #4b5563;
            font-size: 16px;
        }
        #block-timer {
            font-size: 28px;
            font-weight: bold;
            color: #1e293b;
            margin-top: 15px;
            background: #f1f5f9;
            padding: 10px 20px;
            border-radius: 8px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="block-screen" style="display: none;">
        <h1>Giới Hạn Truy Cập!</h1>
        <p>Bạn đã hết lượt lấy tài khoản miễn phí công khai.</p>
        <p>Vui lòng quay lại sau:</p>
        <div id="block-timer">00:00:00</div>
    </div>

    <div class="container" id="main-app">
        <h2>Xác Thực Nhận Tài Khoản</h2>
        
        <div id="unlock-section">
            <div class="input-group">
                <label>Apple ID được chỉ định ngẫu nhiên:</label>
                <input type="text" id="display-apple-id" readonly style="font-weight: bold; background-color: #e2e8f0;">
            </div>

            <div class="input-group">
                <label for="unlock-password">Nhập mật khẩu của Apple ID này để lấy thông tin:</label>
                <div class="field-box">
                    <input type="password" id="unlock-password" placeholder="Nhập mật khẩu mở khóa...">
                    <button onclick="checkUnlockPassword()">Xác nhận</button>
                </div>
                <p id="error-msg">Mật khẩu xác thực không chính xác. Vui lòng thử lại!</p>
            </div>
        </div>

        <div id="result-section">
            <div class="timer-banner">
                Thời gian sao chép còn lại: <span id="countdown-num">90</span> giây
            </div>

            <div class="input-group">
                <label>Email nhận được (Hiển thị ẩn):</label>
                <div class="field-box">
                    <input type="password" id="result-email" readonly>
                    <button class="btn-success" onclick="copyText('result-email')">Sao chép</button>
                </div>
            </div>

            <div class="input-group">
                <label>Mật khẩu nhận được (Hiển thị ẩn):</label>
                <div class="field-box">
                    <input type="password" id="result-password" readonly>
                    <button class="btn-success" onclick="copyText('password-email')">Sao chép</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Đã sao chép vào bộ nhớ tạm!</div>

    <script>
        // =========================================================================
        // DANH SÁCH TÀI KHOẢN CỦA BẠN
        // =========================================================================
        const DATA_ACCOUNTS = [
            {
                appleId: "apple_id_ngau_nhien_1@gmail.com", 
                unlockPassword: "matkhau1",              
                resultEmail: "email_an_so_1@gmail.com",   
                resultPassword: "mat_khau_an_so_1"       
            },
            {
                appleId: "apple_id_ngau_nhien_2@gmail.com",
                unlockPassword: "matkhau2",
                resultEmail: "email_an_so_2@gmail.com",
                resultPassword: "mat_khau_an_so_2"
            }
        ];
        // =========================================================================

        // Quy đổi thời gian (miligiây)
        const VIEW_TIME_LIMIT = 90 * 1000;          // 90 giây xem thông tin
        const BLOCK_TIME_LIMIT = 3 * 60 * 60 * 1000; // 3 tiếng khóa

        let currentAccount = null;
        let countdownInterval = null;

        window.onload = function() {
            checkTimeStatus();
        };

        // Hàm kiểm tra trạng thái thời gian xem người dùng có đang bị khóa hay không
        function checkTimeStatus() {
            const unlockTimestamp = localStorage.getItem('apple_unlock_time');
            const savedAccountIndex = localStorage.getItem('apple_saved_index');

            if (unlockTimestamp) {
                const timeElapsed = Date.now() - parseInt(unlockTimestamp);

                // TRƯỜNG HỢP 1: Đang trong 90 giây xem bài (Người dùng F5 lại trang)
                if (timeElapsed < VIEW_TIME_LIMIT) {
                    currentAccount = DATA_ACCOUNTS[parseInt(savedAccountIndex)];
                    showResultView();
                    start90sCountdown(VIEW_TIME_LIMIT - timeElapsed);
                } 
                // TRƯỜNG HỢP 2: Đang trong thời gian bị khóa 3 tiếng
                else if (timeElapsed < (VIEW_TIME_LIMIT + BLOCK_TIME_LIMIT)) {
                    showBlockScreen( (VIEW_TIME_LIMIT + BLOCK_TIME_LIMIT) - timeElapsed );
                } 
                // TRƯỜNG HỢP 3: Đã hết thời gian phạt 3 tiếng -> Giải phóng cho chơi tiếp
                else {
                    localStorage.removeItem('apple_unlock_time');
                    localStorage.removeItem('apple_saved_index');
                    initRandomAccount();
                }
            } else {
                initRandomAccount();
            }
        }

        // Khởi tạo tài khoản random ban đầu
        function initRandomAccount() {
            if (DATA_ACCOUNTS.length > 0) {
                const randomIndex = Math.floor(Math.random() * DATA_ACCOUNTS.length);
                currentAccount = DATA_ACCOUNTS[randomIndex];
                document.getElementById('display-apple-id').value = currentAccount.appleId;
                // Lưu tạm index để nếu có unlock rồi F5 vẫn giữ nguyên nick này
                localStorage.setItem('apple_saved_index', randomIndex);
            }
        }

        // Khi người dùng bấm nút xác nhận mật khẩu
        function checkUnlockPassword() {
            const userInput = document.getElementById('unlock-password').value;
            const errorElement = document.getElementById('error-msg');

            if (userInput === currentAccount.unlockPassword) {
                errorElement.style.display = 'none';
                
                // Đánh dấu thời gian bắt đầu unlock vào máy người dùng
                localStorage.setItem('apple_unlock_time', Date.now().toString());
                
                showResultView();
                start90sCountdown(VIEW_TIME_LIMIT);
            } else {
                errorElement.style.display = 'block';
            }
        }

        // Hiển thị khung chứa Email / MK kết quả
        function showResultView() {
            document.getElementById('unlock-section').style.display = 'none';
            document.getElementById('result-email').value = currentAccount.resultEmail;
            document.getElementById('result-password').value = currentAccount.resultPassword;
            document.getElementById('result-section').style.display = 'block';
        }

        // Chạy đồng hồ đếm ngược 90 giây công khai trên màn hình
        function start90sCountdown(msRemaining) {
            const timerDisplay = document.getElementById('countdown-num');
            
            if(countdownInterval) clearInterval(countdownInterval);

            countdownInterval = setInterval(() => {
                msRemaining -= 1000;
                let secondsLeft = Math.ceil(msRemaining / 1000);
                timerDisplay.innerText = secondsLeft;

                if (msRemaining <= 0) {
                    clearInterval(countdownInterval);
                    // Hết 90 giây chuyển ngay sang màn hình khóa 3 tiếng
                    showBlockScreen(BLOCK_TIME_LIMIT);
                }
            }, 1000);
        }

        // Kích hoạt màn hình khóa và đếm ngược 3 tiếng
        function showBlockScreen(msRemaining) {
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('block-screen').style.display = 'flex';

            if(countdownInterval) clearInterval(countdownInterval);

            const blockTimerDisplay = document.getElementById('block-timer');

            countdownInterval = setInterval(() => {
                msRemaining -= 1000;

                if (msRemaining <= 0) {
                    clearInterval(countdownInterval);
                    // Hết hạn phạt -> Xóa dữ liệu cũ, tải lại trang để họ lấy tiếp
                    localStorage.removeItem('apple_unlock_time');
                    localStorage.removeItem('apple_saved_index');
                    window.location.reload();
                } else {
                    // Định dạng hiển thị Giờ:Phút:Giây
                    let hours = Math.floor(msRemaining / (1000 * 60 * 60));
                    let minutes = Math.floor((msRemaining % (1000 * 60 * 60)) / (1000 * 60));
                    let seconds = Math.floor((msRemaining % (1000 * 60)) / 1000);

                    // Thêm số 0 phía trước nếu số < 10
                    hours = hours < 10 ? "0" + hours : hours;
                    minutes = minutes < 10 ? "0" + minutes : minutes;
                    seconds = seconds < 10 ? "0" + seconds : seconds;

                    blockTimerDisplay.innerText = `${hours}:${minutes}:${seconds}`;
                }
            }, 1000);
        }

        // Hàm copy văn bản ẩn
        function copyText(elementId) {
            const inputElement = document.getElementById(elementId);
            navigator.clipboard.writeText(inputElement.value).then(() => {
                showToast();
            }).catch(err => {
                inputElement.select();
                document.execCommand('copy');
                showToast();
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 1500);
        }
    </script>
</body>
</html>
